<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | Moodget</title>
    <link rel="icon" href="assets/icons/favicon.png" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="app-header signup-header">
        <div class="app-header-container">
          <div class="app-header-inner">
            <a href="index.html" class="app-brand">
              <img
                src="assets/icons/logo.png"
                alt="Moodget 로고"
                class="app-logo"
              />
              <span class="heading-2 app-brand-title">Moodget</span>
            </a>
          </div>
        </div>
      </header>

      <main class="main signup-page">
        <div class="container">
          <button
            class="icon-btn back-btn"
            type="button"
            aria-label="뒤로가기"
            onclick="location.href = 'signin.html'"
          >
            <img src="assets/icons/left.png" alt="" class="icon-btn-img" />
          </button>

          <div class="signup-desktop-visual">
            <div class="signin-desktop-copy">
              <h2>
                “왜 샀는지를<br />
                기록하는 감정 가계부”
              </h2>
              <p>
                소비에 감정을 더하면<br />
                내 소비 습관이 보이기 시작해요
              </p>
            </div>

            <div class="signin-emotion-grid">
              <div>
                <img src="assets/icons/reward.png" alt="" />
                <span>보람있음</span>
              </div>

              <div>
                <img src="assets/icons/happy.png" alt="" />
                <span>행복함</span>
              </div>

              <div>
                <img src="assets/icons/impulse.png" alt="" />
                <span>충동구매</span>
              </div>

              <div>
                <img src="assets/icons/regret.png" alt="" />
                <span>후회됨</span>
              </div>

              <div>
                <img src="assets/icons/neutral.png" alt="" />
                <span>그냥저냥</span>
              </div>
            </div>
          </div>

          <div class="signup-content">
            <section class="signup-section">
              <h1 class="heading-2 signup-title">회원가입</h1>

              <form class="signup-form">
                <div class="input-group">
                  <label for="name" class="input-label">이름</label>
                  <div class="input-box">
                    <input
                      type="text"
                      id="name"
                      name="name"
                      placeholder="홍길동"
                      class="input-field"
                    />
                  </div>
                </div>

                <div class="input-group">
                  <label for="email" class="input-label">이메일</label>
                  <div class="input-box">
                    <img
                      src="assets/icons/mail.png"
                      alt=""
                      class="input-icon"
                    />
                    <input
                      type="email"
                      id="email"
                      name="email"
                      placeholder="hello@moodget.com"
                      class="input-field"
                    />
                  </div>
                </div>

                <div class="input-group">
                  <label for="password" class="input-label">비밀번호</label>
                  <div class="input-box">
                    <img src="assets/icons/lock.png" class="input-icon" />

                    <input
                      type="password"
                      id="password"
                      name="password"
                      placeholder="••••••••"
                      class="input-field"
                    />

                    <button type="button" class="password-toggle">
                      <img src="assets/icons/eye_off.png" class="eye-icon" />
                    </button>
                  </div>
                </div>

                <div class="input-group">
                  <label for="password-confirm" class="input-label"
                    >비밀번호 확인</label
                  >
                  <div class="input-box">
                    <img src="assets/icons/lock.png" class="input-icon" />

                    <input
                      type="password"
                      id="password-confirm"
                      name="password-confirm"
                      placeholder="••••••••"
                      class="input-field"
                    />

                    <button type="button" class="password-toggle">
                      <img src="assets/icons/eye_off.png" class="eye-icon" />
                    </button>
                  </div>
                </div>

                <button
                  type="button"
                  class="btn-primary signup-btn"
                  onclick="location.href = 'onboarding.html'"
                >
                  회원가입
                </button>
              </form>
            </section>
          </div>

          <div class="social-login signup-social">
            <div class="social-divider">
              <span></span>
              <p class="caption">또는 소셜 로그인</p>
              <span></span>
            </div>

            <div class="social-buttons">
              <button
                type="button"
                class="social-btn kakao"
                aria-label="카카오 회원가입"
              >
                <img src="assets/icons/kakao.png" alt="" />
              </button>
              <button
                type="button"
                class="social-btn apple"
                aria-label="애플 회원가입"
              >
                <img src="assets/icons/apple.png" alt="" />
              </button>
              <button
                type="button"
                class="social-btn google"
                aria-label="구글 회원가입"
              >
                <img src="assets/icons/google.png" alt="" />
              </button>
            </div>

            <p class="caption signup-link-text">
              이미 계정이 있으신가요?
              <a href="signin.html" class="signup-link">로그인</a>
            </p>
          </div>
        </div>
      </main>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
