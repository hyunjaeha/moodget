<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding | Moodget</title>
    <link rel="icon" href="assets/icons/favicon.png" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <main class="main onboarding-page">
        <div class="container">
          <div class="onboarding-content">
            <div class="progress-bar fade-up delay-1">
              <span class="progress-step active"></span>
              <span class="progress-step"></span>
              <span class="progress-step"></span>
            </div>

            <section class="onboarding-section">
              <p class="heading-4 onboarding-step fade-up delay-2">
                Step 1 of 3
              </p>

              <h1 class="heading-2 onboarding-title fade-up delay-3">
                매달 얼마나 쓰는지<br />
                같이 알아봐요
              </h1>

              <p class="caption onboarding-description fade-up delay-4">
                솔직하게 답해줘도 괜찮아요
              </p>

              <div class="option-list">
                <button type="button" class="option-card fade-up delay-5">
                  <div class="option-left">
                    <div class="option-icon-wrap">
                      <img
                        src="assets/icons/light.png"
                        alt=""
                        class="option-icon"
                      />
                    </div>

                    <div class="option-text">
                      <strong class="option-title">잘 알아요</strong>
                      <p class="option-description">
                        매달 지출을 파악하고 있어요
                      </p>
                    </div>
                  </div>

                  <span class="option-check" aria-hidden="true"></span>
                </button>

                <button type="button" class="option-card fade-up delay-6">
                  <div class="option-left">
                    <div class="option-icon-wrap">
                      <img
                        src="assets/icons/soso.png"
                        alt=""
                        class="option-icon"
                      />
                    </div>

                    <div class="option-text">
                      <strong class="option-title">대충 알아요</strong>
                      <p class="option-description">
                        어느 정도는 알지만 정확하진 않아요
                      </p>
                    </div>
                  </div>

                  <span class="option-check" aria-hidden="true"></span>
                </button>

                <button type="button" class="option-card fade-up delay-7">
                  <div class="option-left">
                    <div class="option-icon-wrap">
                      <img
                        src="assets/icons/sad.png"
                        alt=""
                        class="option-icon"
                      />
                    </div>

                    <div class="option-text">
                      <strong class="option-title">잘 몰라요</strong>
                      <p class="option-description">
                        카드 명세서 나와야 알아요
                      </p>
                    </div>
                  </div>

                  <span class="option-check" aria-hidden="true"></span>
                </button>
              </div>

              <div class="onboarding-actions fade-up delay-8">
                <button
                  type="button"
                  class="btn-primary onboarding-next-btn"
                  disabled
                >
                  다음
                </button>
                <button
                  type="button"
                  class="onboarding-skip-btn caption"
                  onclick="window.location.href = 'home.html'"
                >
                  나중에 할게요
                </button>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
