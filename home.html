<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Moodget</title>
    <link rel="icon" href="assets/icons/favicon.png" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <!-- header -->
      <header class="app-header">
        <div class="app-header-container">
          <div class="app-header-inner">
            <a href="home.html" class="app-brand">
              <img src="assets/icons/logo.png" class="app-logo" />
              <h1 class="heading-2 app-brand-title">Moodget</h1>
            </a>

            <button class="app-profile-btn">
              <img src="assets/icons/profile.png" class="app-profile-img" />
            </button>
          </div>
        </div>
      </header>

      <!-- desktop sidebar nav -->
      <aside class="desktop-sidebar">
        <nav class="side-nav">
          <a href="home.html" class="side-nav-item active">
            <img
              src="assets/icons/home_hover.png"
              alt=""
              class="side-nav-icon"
            />
            <span>홈</span>
          </a>

          <a href="record.html" class="side-nav-item">
            <img
              src="assets/icons/record.png"
              class="side-nav-icon default-icon"
            />
            <img
              src="assets/icons/record_hover.png"
              class="side-nav-icon hover-icon"
            />
            <span>기록</span>
          </a>

          <a href="calendar.html" class="side-nav-item">
            <img
              src="assets/icons/calender.png"
              class="side-nav-icon default-icon"
            />
            <img
              src="assets/icons/calender_hover.png"
              class="side-nav-icon hover-icon"
            />
            <span>캘린더</span>
          </a>

          <a href="setting.html" class="side-nav-item">
            <img
              src="assets/icons/setting.png"
              class="side-nav-icon default-icon"
            />
            <img
              src="assets/icons/setting_hover.png"
              class="side-nav-icon hover-icon"
            />
            <span>설정</span>
          </a>
        </nav>
      </aside>

      <main class="main home-page">
        <div class="container">
          <section class="home-summary">
            <p class="home-subtitle">안녕하세요, 지수님</p>
            <h2 class="home-title heading-2">3월 소비 현황</h2>

            <div class="summary-card-group">
              <article class="summary-card">
                <div class="summary-top">
                  <div class="summary-chart">
                    <div class="chart-ring">
                      <div class="chart-center">
                        <strong class="chart-percent">0%</strong>
                        <span class="chart-label caption">사용</span>
                      </div>
                    </div>
                  </div>

                  <div class="summary-info">
                    <p class="summary-info-label caption">이번 달 지출</p>
                    <h2 class="summary-amount">₩ 284,500</h2>
                    <p class="summary-subtext caption">예산 ₩ 500,000 중</p>
                  </div>
                </div>

                <div class="emotion-bar">
                  <span class="emotion-bar-item reward"></span>
                  <span class="emotion-bar-item impulse"></span>
                  <span class="emotion-bar-item happy"></span>
                  <span class="emotion-bar-item regret"></span>
                </div>
              </article>

              <!-- 태블릿, 데스크탑 레이아웃 -->
              <article class="summary-chart-card">
                <div class="summary-chart">
                  <div class="chart-ring">
                    <div class="chart-center">
                      <strong class="chart-percent">0%</strong>
                      <span class="chart-label caption">사용</span>
                    </div>
                  </div>
                </div>

                <p class="chart-card-text">예산의 57% 사용</p>
              </article>
            </div>
          </section>

          <section class="recent-spending">
            <div class="section-header">
              <p class="section-title">최근 지출</p>
              <a href="#" class="view-all-link">
                <span>전체보기</span>
                <img
                  src="assets/icons/right.png"
                  alt=""
                  class="view-all-icon"
                />
              </a>
            </div>

            <div class="spending-list">
              <article class="spending-card">
                <div class="spending-main">
                  <div>
                    <h4 class="spending-title heading-3">스타벅스</h4>
                    <p class="spending-category">카페</p>
                  </div>

                  <div class="spending-right">
                    <strong class="spending-amount heading-3">₩ 6,500</strong>
                    <div class="emotion-chip impulse-chip">
                      <img
                        src="assets/icons/impulse_stroke.png"
                        alt=""
                        class="chip-icon"
                      />
                      <span>충동구매</span>
                    </div>
                  </div>
                </div>
              </article>

              <article class="spending-card">
                <div class="spending-main">
                  <div>
                    <h4 class="spending-title heading-3">헬스장</h4>
                    <p class="spending-category">건강</p>
                  </div>

                  <div class="spending-right">
                    <strong class="spending-amount heading-3">₩ 75,000</strong>
                    <div class="emotion-chip reward-chip">
                      <img
                        src="assets/icons/reward_stroke.png"
                        alt=""
                        class="chip-icon"
                      />
                      <span>보람있음</span>
                    </div>
                  </div>
                </div>
              </article>

              <article class="spending-card">
                <div class="spending-main">
                  <div>
                    <h4 class="spending-title heading-3">쿠팡</h4>
                    <p class="spending-category">쇼핑</p>
                  </div>

                  <div class="spending-right">
                    <strong class="spending-amount heading-3">₩ 32,000</strong>
                    <div class="emotion-chip regret-chip">
                      <img
                        src="assets/icons/regret_stroke.png"
                        alt=""
                        class="chip-icon"
                      />
                      <span>후회됨</span>
                    </div>
                  </div>
                </div>
              </article>
            </div>
          </section>
        </div>
      </main>

      <!-- footer -->
      <footer class="app-footer">
        <nav class="bottom-nav">
          <a href="home.html" class="bottom-nav-item active">
            <img
              src="assets/icons/home.png"
              alt=""
              class="nav-icon default-icon"
            />
            <img
              src="assets/icons/home_hover.png"
              alt=""
              class="nav-icon hover-icon"
            />
            <span>홈</span>
          </a>

          <a href="record.html" class="bottom-nav-item">
            <img src="assets/icons/record.png" class="nav-icon default-icon" />
            <img
              src="assets/icons/record_hover.png"
              class="nav-icon hover-icon"
            />
            <span>기록</span>
          </a>

          <a href="calendar.html" class="bottom-nav-item">
            <img
              src="assets/icons/calender.png"
              class="nav-icon default-icon"
            />
            <img
              src="assets/icons/calender_hover.png"
              class="nav-icon hover-icon"
            />
            <span>캘린더</span>
          </a>

          <a href="setting.html" class="bottom-nav-item">
            <img src="assets/icons/setting.png" class="nav-icon default-icon" />
            <img
              src="assets/icons/setting_hover.png"
              class="nav-icon hover-icon"
            />
            <span>설정</span>
          </a>
        </nav>
      </footer>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
